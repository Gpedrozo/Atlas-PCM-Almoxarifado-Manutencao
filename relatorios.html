
<!DOCTYPE html>

<head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Relatórios - Atlas PCM Almoxarifado</title> <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('atlas_theme')||'light');</script> <link rel="stylesheet" href="style.css?v=4"> <link rel="stylesheet" href="atlas-industrial.css?v=1"> <style> /* -- Layout relatórios: flexbox para menu recolhível -- */
    .relatorio-layout { display: flex; gap: 16px; align-items: flex-start; }

    /* Menu lateral: ícones por padrão, expande ao passar o mouse */
    .relatorio-menu {
      flex-shrink: 0;
      width: 48px;
      overflow: hidden;
      transition: width .22s cubic-bezier(.4,0,.2,1);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 6px 0;
      display: flex;
      flex-direction: column;
      gap: 1px;
      height: fit-content;
      position: sticky;
      top: 20px;
    }
    .relatorio-menu:hover { width: 192px; }

    /* Item do menu - padrão colapsado (centralizado) */
    .relatorio-menu-item {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 8px 0;
      border-left: 3px solid transparent;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      transition: background .15s, color .15s, border-color .15s, padding .15s, gap .15s, justify-content .15s;
      border-top: none; border-right: none; border-bottom: none;
      background: none;
      text-align: left;
      width: 100%;
      white-space: nowrap;
    }
    /* Expandido ao hover no menu */
    .relatorio-menu:hover .relatorio-menu-item {
      justify-content: flex-start;
      gap: 8px;
      padding: 7px 10px 7px 12px;
    }
    .relatorio-menu-item:hover { background: var(--bg); color: var(--text); border-left-color: rgba(247,148,29,0.5); }
    .relatorio-menu-item.active { background: var(--primary); color: #fff; border-left-color: var(--accent); }
    .relatorio-menu-item .ri { font-size: 16px; flex-shrink: 0; min-width: 20px; text-align: center; }

    /* Label: oculto (sem espaço) por padrão, aparece no hover do menu */
    .relatorio-menu-item .rm-label {
      overflow: hidden;
      max-width: 0;
      opacity: 0;
      transition: max-width .22s cubic-bezier(.4,0,.2,1), opacity .15s;
    }
    .relatorio-menu:hover .relatorio-menu-item .rm-label { max-width: 180px; opacity: 1; }

    .relatorio-panel { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; min-width: 0; overflow-x: hidden; }
    .relatorio-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
    .relatorio-titulo { font-size: 17px; font-weight: 700; color: var(--text); }
    .relatorio-subtitle { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
    .filtro-row { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; flex-wrap: wrap; }
    .filtro-row label { font-size: 12.5px; color: var(--text-muted); }
    .filtro-row input, .filtro-row select { padding: 6px 10px; font-size: 13px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); }
    .sumario-kpis { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 14px; margin-bottom: 22px; }
    .sumario-kpi { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; }
    .sumario-kpi-val { font-size: 22px; font-weight: 800; color: var(--primary); line-height: 1.1; }
    .sumario-kpi-lbl { font-size: 11.5px; color: var(--text-muted); margin-top: 3px; }

    /* PRINT */
    @media print {
      .no-print { display: none !important; }
      .sidebar { display: none !important; }
      .topbar  { display: none !important; }
      .relatorio-menu { display: none !important; }
      .relatorio-layout { grid-template-columns: 1fr; }
      .relatorio-panel { border: none; padding: 0; }
      .print-header { display: flex !important; align-items: center; gap: 16px; margin-bottom: 22px; padding-bottom: 12px; border-bottom: 2px solid #1e3a5f; }
      .relatorio-header { display: none !important; }
      .relatorio-menu { display: none !important; }
      .relatorio-layout { grid-template-columns: 1fr !important; }
      .relatorio-panel { border: none !important; padding: 0 !important; }
    }
    .print-header { display: none; }
    .print-header .print-logo { max-height: 48px; }
    .print-header .print-info { flex: 1; }
    .print-header .print-report-name { font-size: 18px; font-weight: 700; color: #1e3a5f; }
    .print-header .print-date { font-size: 12px; color: #666; }
  </style>

nclick="mostrarRelatorio('ativos_mat', this)" title="Materiais por Ativo"><span class="rm-label">Materiais por Ativo</span></button> <button class="relatorio-menu-item" onclick="mostrarRelatorio('ativos_custo', this)" title="Custo por Ativo"><span class="rm-label">Custo por Ativo</span></button> <button class="relatorio-menu-item" onclick="mostrarRelatorio('requisicoes', this)" title="Requisições de Compra"><span class="rm-label">Requisições de Compra</span></button> <button class="relatorio-menu-item" onclick="mostrarRelatorio('ajustes', this)" title="Histórico de Ajustes"><span class="rm-label">Histórico de Ajustes</span></button> <button class="relatorio-menu-item" onclick="mostrarRelatorio('executivo', this)" title="Resumo Executivo"><span class="rm-label">Resumo Executivo</span></button> <button class="relatorio-menu-item" onclick="mostrarRelatorio('consertos', this)" title="Consertos Externos"><span class="rm-label">Consertos Externos</span></button> </div> <!-- Painel de relatório --> <div class="relatorio-panel" id="relatorio-panel"> <div class="print-header" id="print-header"> <img id="print-logo" class="print-logo" src="" alt="" style="display:none"> <div class="print-info"> <div class="print-report-name" id="print-report-name">-</div> <div class="print-date" id="print-date">-</div> </div> </div> <div id="relatorio-content"> <!-- conteúdo dinâmico --> </div> </div> </div> </div> </div>

<script> DB.init().then(function() {
    if (!Auth.requireLogin()) { return; }
    Utils.applyTheme();
    Utils.renderSidebarUser();
    Utils.renderSidebarLogo();
    Utils.marcarNavAtivo('relatorios');
    Utils.aplicarPermissoes();
    // Injeta atributos de dados no <body> para rodapé CSS no print
    (function() {
      const cfg = DB.Config.get();
      document.body.setAttribute('data-empresa', cfg.empresa || 'Atlas Ind. Eletrodomésticos');
      document.body.setAttribute('data-print-date', new Date().toLocaleDateString('pt-BR'));
    })();
    _inicializar();
  });

  // Estado
  let relatorioAtual = 'inventario';

  function mostrarRelatorio(tipo, btn) {
    relatorioAtual = tipo;
    document.querySelectorAll('.relatorio-menu-item').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');
    renderRelatorio(tipo);
  }

  function renderRelatorio(tipo) {
    const el = document.getElementById('relatorio-content');
    const nomes = {
      inventario:    ' Inventário Geral',
      catalogo:      ' Catálogo de Materiais',
      consumo:       ' Consumo por Item',
      periodo:       ' Movimentações por Período',
      criticidade:   ' Análise de Criticidade',
      fornecedor:    ' Custo por Fornecedor',
      ativos_mat:    ' Materiais por Ativo',
      ativos_custo:  ' Custo por Ativo',
      requisicoes:   ' Requisições de Compra',
      ajustes:       ' Histórico de Ajustes',
      executivo:     ' Resumo Executivo',
      consertos:     ' Consertos Externos'
    };
    document.getElementById('print-report-name').textContent = nomes[tipo] || tipo;
    document.getElementById('print-date').textContent =
      'Gerado em: ' + new Date().toLocaleString('pt-BR');
    // Atualiza logo de impressão
    const cfg = DB.Config.get();
    const printLogo = document.getElementById('print-logo');
    if (cfg.logo) { printLogo.src = cfg.logo; printLogo.style.display = 'block'; }
    else { printLogo.style.display = 'none'; }

    switch(tipo) {
      case 'inventario':   el.innerHTML = relInventario();   paginar('tbody-inventario', 10); break;
      case 'catalogo':     el.innerHTML = relCatalogo();     paginar('tbody-catalogo', 10);   break;
      case 'consumo':      el.innerHTML = relConsumo();      paginar('tbody-consumo', 10);    break;
      case 'periodo':      el.innerHTML = relPeriodo(); Utils.initSearchSelect('filt-peca'); paginar('tbody-periodo', 10); break;
      case 'criticidade':  el.innerHTML = relCriticidade();  paginar('tbody-criticos', 10); paginar('tbody-baixos', 10); break;
      case 'fornecedor':   el.innerHTML = relFornecedor();   paginar('tbody-fornecedor', 10); break;
      case 'ativos_mat':   el.innerHTML = relAtivosMat();    break;
      case 'ativos_custo': el.innerHTML = relAtivosCusto();  paginar('tbody-ativos-custo', 10); break;
      case 'requisicoes':  el.innerHTML = relRequisicoes();  paginar('tbody-requisicoes', 10); break;
      case 'ajustes':      el.innerHTML = relAjustes();      paginar('tbody-ajustes', 10);    break;
      case 'executivo':    el.innerHTML = relExecutivo();    break;
      case 'consertos':    el.innerHTML = relConsertos();   paginar('tbody-consertos-rel', 15); break;
    }
  }

  // -- INVENTÁRIO GERAL ----------------------------------
  function mediaUltEntradas(pecaId, n) {
    const entradas = DB.Movimentos.listar()
      .filter(m => m.pecaId === pecaId && m.tipo === 'ENTRADA' && Number(m.precoUnitario) > 0)
      .sort((a,b) => (b.data||'').localeCompare(a.data||''))
      .slice(0, n);
    if (!entradas.length) return 0;
    return entradas.reduce((s,m) => s + Number(m.precoUnitario), 0) / entradas.length;
  }

  function relInventario() {
    const pecas  = DB.Pecas.ativas();
    const saldos = DB.Movimentos.saldoTodos();
    let valorTotal = 0, okCnt = 0, baixoCnt = 0, criticoCnt = 0;
    const rows = pecas.map(p => {
      const s = saldos[p.id] || 0;
      const preco = Number(p.precoUnitario) || 0;
      const total = s * preco;
      valorTotal += total;
      const m3 = mediaUltEntradas(p.id, 3);
      const m5 = mediaUltEntradas(p.id, 5);
      const st = Utils.statusEstoque(s, p.estoqueMinimo);
      if (st.classe === 'ok') okCnt++;
      else if (st.classe === 'low') baixoCnt++;
      else criticoCnt++;
      const pct = p.estoqueMinimo > 0  Math.min(100, (s / p.estoqueMinimo) * 100) : 100;
      const barColor = st.classe === 'ok' ? 'var(--success)' : st.classe === 'low' ? 'var(--warning)' : 'var(--danger)';
      return `<tr class="inv-row"
          data-busca="${(p.codigo||'').toLowerCase()} ${(p.nome||'').toLowerCase()} ${(p.categoria||'').toLowerCase()}"
          data-status="${st.classe}"
          style="cursor:pointer"
          onclick="verEntradasItem(${JSON.stringify(p.id)},${JSON.stringify(p.nome)})"
          title="Clique para ver últimas entradas"> <td><code style="font-size:11px;background:var(--bg);padding:2px 7px;border-radius:4px;font-family:var(--font-mono)">${Utils.safe(p.codigo)}</code></td> <td> <div style="font-weight:600;font-size:13px;color:var(--primary-dark)">${Utils.safe(p.nome)}</div> <div style="font-size:11px;color:var(--text-muted);margin-top:1px">${Utils.safe(p.categoria||'-')}</div> </td> <td> <div style="display:flex;align-items:center;gap:6px"> <span style="font-weight:700;min-width:28px">${s} <span style="font-size:10px;font-weight:400;color:var(--text-muted)">${Utils.safe(p.unidade)}</span></span> <div style="flex:1;height:5px;border-radius:3px;background:var(--border);overflow:hidden;min-width:40px"> <div style="height:100%;border-radius:3px;background:${barColor};width:${pct}%"></div> </div> <span style="font-size:10px;color:var(--text-muted)">${p.estoqueMinimo}</span> </div> </td> <td style="text-align:right">${preco > 0  Utils.fmtMoeda(preco) : '<span style="color:var(--text-muted)">-</span>'}</td> <td style="text-align:right;font-size:11px;color:var(--text-muted)">${m3 > 0  Utils.fmtMoeda(m3) : '-'}</td> <td style="text-align:right;font-size:11px;color:var(--text-muted)">${m5 > 0  Utils.fmtMoeda(m5) : '-'}</td> <td style="text-align:right;font-weight:600">${total > 0  Utils.fmtMoeda(total) : '<span style="color:var(--text-muted)">-</span>'}</td> <td>${Utils.badgeEstoque(s, p.estoqueMinimo)}</td> </tr>`;
    });
    return `
      <div class="relatorio-header"> <div> <div class="relatorio-titulo"> Inventário Geral</div> <div class="relatorio-subtitle">Posição atual de todos os itens ativos - clique num item para ver as últimas entradas</div> </div> </div> <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px"> <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow)"> <div style="width:40px;height:40px;border-radius:10px;background:#E4EAFB;color:var(--primary);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0"></div> <div><div style="font-size:22px;font-weight:800;color:var(--text);line-height:1">${pecas.length}</div><div style="font-size:11px;color:var(--text-muted);margin-top:2px">Itens Ativos</div></div> </div> <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow)"> <div style="width:40px;height:40px;border-radius:10px;background:#E6F4EA;color:var(--success);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0"></div> <div><div style="font-size:22px;font-weight:800;color:var(--text);line-height:1">${okCnt}</div><div style="font-size:11px;color:var(--text-muted);margin-top:2px">Nível Normal</div></div> </div> <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow)"> <div style="width:40px;height:40px;border-radius:10px;background:#FFF8E1;color:var(--warning);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0"></div> <div><div style="font-size:22px;font-weight:800;color:var(--text);line-height:1">${baixoCnt}</div><div style="font-size:11px;color:var(--text-muted);margin-top:2px">Estoque Baixo</div></div> </div> <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow)"> <div style="width:40px;height:40px;border-radius:10px;background:#FCE8E6;color:var(--danger);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0"></div> <div><div style="font-size:22px;font-weight:800;color:var(--text);line-height:1">${criticoCnt}</div><div style="font-size:11px;color:var(--text-muted);margin-top:2px">Críticos / Zerados</div></div> </div> <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow)"> <div style="width:40px;height:40px;border-radius:10px;background:#E4EAFB;color:var(--primary);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0"></div> <div><div style="font-size:15px;font-weight:800;color:var(--text);line-height:1.2">${Utils.fmtMoeda(valorTotal)}</div><div style="font-size:11px;color:var(--text-muted);margin-top:2px">Valor em Estoque</div></div> </div> </div> <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px"> <div class="search-bar" style="flex:1;min-width:200px"> <input type="text" id="inv-busca" placeholder="Buscar por código, nome ou categoria..." oninput="filtrarInventario()" style="border:none;background:transparent;outline:none;font-size:13px;color:var(--text);flex:1;padding:0"> </div> <select id="inv-filtro-status" onchange="filtrarInventario()" style="padding:7px 12px;font-size:13px;border:1.5px solid var(--border);border-radius:8px;background:var(--card);color:var(--text)"> <option value="">Todos os Status</option> <option value="ok">Nível Normal</option> <option value="low">Estoque Baixo</option> <option value="critical">Crítico / Zerado</option> </select> <span id="inv-contagem" style="font-size:12px;color:var(--text-muted);white-space:nowrap">${pecas.length} itens</span> </div> <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:var(--shadow)"> <div class="table-wrapper"> <table> <thead> <tr> <th style="width:90px">Código</th> <th>Nome / Categoria</th> <th style="width:180px">Saldo / Nível</th> <th style="text-align:right;width:100px">Preço Unit.</th> <th style="text-align:right;width:90px">Méd. 3 ult.</th> <th style="text-align:right;width:90px">Méd. 5 ult.</th> <th style="text-align:right;width:100px">Valor Total</th> <th style="text-align:center;width:80px">Status</th> </tr> </thead> <tbody id="tbody-inventario"> ${rows.join('') || '<tr><td colspan="8" style="text-align:center;color:var(--text-muted)">Nenhum item cadastrado</td></tr>'}

  function relPeriodo(de, ate, filtPeca) {
    const hoje = Utils.dataHoje();
    const primeroDiaMes = hoje.slice(0,7) + '-01';

    ate = ate || hoje;
    filtPeca = filtPeca || '';
    const todasPecas = DB.Pecas.listar();
    const pecasMap = {};
    todasPecas.forEach(p => pecasMap[p.id] = p);
    const movs = DB.Movimentos.listar().filter(m => {
      if (!m.data || m.data.slice(0,10) < de || m.data.slice(0,10) > ate) return false;
      if (filtPeca && m.pecaId !== filtPeca) return false;
      return true;
    });
    const usuariosMap = {};
    DB.Usuarios.listar().forEach(u => usuariosMap[u.id] = u.nome);

      const p = pecasMap[m.pecaId];
      if (m.tipo === 'ENTRADA') totEntrada += Number(m.quantidade);
      else if (m.tipo === 'SAIDA') totSaida += Number(m.quantidade);
      else totAjuste += Number(m.quantidade);

      return `<tr> <td>${Utils.formatarDataHora(m.data)}</td> <td>${p  Utils.safe(p.nome) : '-'}</td> <td><span class="${cls}">${Utils.labelTipo(m.tipo)}</span></td> <td style="text-align:center;font-weight:600">${m.quantidade}</td> <td>${Utils.safe(m.ordemServico||'-')}</td> <td>${Utils.safe(usuariosMap[m.responsavel]||'-')}</td> </tr>`;
    });

  // -- ANÁLISE DE CRITICIDADE ---------------------------
  function dataNivelCritico(pecaId, minimo) {
    const movs = DB.Movimentos.listar().filter(m => m.pecaId === pecaId)
      .sort((a,b) => (a.data||'').localeCompare(b.data||''));
    let saldo = 0, dataBaixo = null, dataCritico = null;
    movs.forEach(m => {
      const ant = saldo;
      if (m.tipo==='ENTRADA'||m.tipo==='AJUSTE_ADD') saldo += Number(m.quantidade);
      else if (m.tipo==='SAIDA'||m.tipo==='AJUSTE_SUB') saldo -= Number(m.quantidade);
      else if (m.tipo==='AJUSTE') saldo = Number(m.saldoNovo||saldo);
      if (ant >= minimo && saldo < minimo && !dataBaixo) dataBaixo = m.data;
      if (ant > 0 && saldo <= 0 && !dataCritico) dataCritico = m.data;
    });
    return { dataBaixo, dataCritico };
  }

    const pecas  = DB.Pecas.ativas();
    const saldos = DB.Movimentos.saldoTodos();

    const baixos   = pecas.filter(p => Utils.statusEstoque(saldos[p.id]||0, p.estoqueMinimo).classe === 'low');

    const buildRows = (lista, colorVar) => lista.map(p => {

      return `<tr class="crit-row" data-busca="${(p.codigo||'').toLowerCase()} ${(p.nome||'').toLowerCase()} ${(p.fornecedor||'').toLowerCase()}"> <td><code style="font-size:11px;background:var(--bg);padding:2px 7px;border-radius:4px;font-family:var(--font-mono)">${Utils.safe(p.codigo)}</code></td> <td> <div style="font-weight:600;font-size:13px;color:var(--primary-dark)">${Utils.safe(p.nome)}</div> <div style="font-size:11px;color:var(--text-muted)">${Utils.safe(p.categoria||'-')}</div> </td> <td style="text-align:center;font-weight:700;color:${colorVar}">${s} <span style="font-size:10px;color:var(--text-muted)">${Utils.safe(p.unidade)}</span></td> <td style="text-align:center">${p.estoqueMinimo}</td> <td style="font-size:11.5px;color:${colorVar}">${datas.dataBaixo  Utils.formatarData(datas.dataBaixo) : '-'}</td> <td style="font-size:11.5px;color:var(--danger);font-weight:${colorVar === 'var(--danger)'  '700' : '400'}">${datas.dataCritico  Utils.formatarData(datas.dataCritico) : '-'}</td> <td style="font-size:11px;color:var(--text-muted)">${Utils.safe(p.localização||p.localizacao||'-')}</td> <td style="font-size:12px">${Utils.safe(p.fornecedor||'-')}</td> </tr>`;
    });
    return `

px">Nível Normal</div></div> </div> <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow)"> <div style="width:40px;height:40px;border-radius:10px;background:#E4EAFB;color:var(--primary);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0"></div> <div><div style="font-size:22px;font-weight:800;color:var(--text);line-height:1">${pecas.length}</div><div style="font-size:11px;color:var(--text-muted);margin-top:2px">Total Ativos</div></div> </div> </div> <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px"> <div class="search-bar" style="flex:1;min-width:200px"> <input type="text" id="crit-busca" placeholder="Buscar por código, nome ou fornecedor..." oninput="filtrarCriticidade()" style="border:none;background:transparent;outline:none;font-size:13px;color:var(--text);flex:1;padding:0"> </div> <span id="crit-contagem" style="font-size:12px;color:var(--text-muted);white-space:nowrap">${criticos.length + baixos.length} itens atenção</span> </div> ${criticos.length  `

  function filtrarCriticidade() {

    document.querySelectorAll('.crit-row').forEach(tr => {

  // -- CATÁLOGO DE MATERIAIS -----------------------------
  function verEntradasItem(pecaId, nome) {
    const usuariosMap = {};
    DB.Usuarios.listar().forEach(u => usuariosMap[u.id] = u.nome);
    const entradas = DB.Movimentos.listar()
      .filter(m => m.pecaId === pecaId && m.tipo === 'ENTRADA')
      .sort((a,b) => (b.data||'').localeCompare(a.data||''))
      .slice(0, 20);
    const rows = entradas.map(m => `<tr> <td>${Utils.formatarData(m.data)}</td> <td style="text-align:center">${m.quantidade}</td> <td style="text-align:right">${Number(m.precoUnitario) > 0  Utils.fmtMoeda(Number(m.precoUnitario)) : '-'}</td> <td style="text-align:right;font-weight:700">${Number(m.precoUnitario) > 0  Utils.fmtMoeda(Number(m.precoUnitario) * Number(m.quantidade)) : '-'}</td> <td>${Utils.safe(usuariosMap[m.responsavel]||'-')}</td> <td>${Utils.safe(m.ordemServico||'-')}</td> </tr>`);
    document.getElementById('drill-titulo').textContent = ' ' + nome + ' - últimas entradas';
    document.getElementById('drill-body').innerHTML = rows.length === 0 ? '<div class="empty-state"><p>Nenhuma entrada registrada para este item.</p></div>'
      : `<div class="table-wrapper"><table> <thead><tr><th>Data</th><th style="text-align:center">Qtd</th><th style="text-align:right">Preço Unit.</th><th style="text-align:right">Total</th><th>Responsável</th><th>OS</th></tr></thead> <tbody>${rows.join('')}</tbody> </table></div>`;

  }

  function relCatalogo() {
    const todasPecas = DB.Pecas.listar();
    const saldos     = DB.Movimentos.saldoTodos();

    // KPIs
    const total    = todasPecas.length;
    const ativos   = todasPecas.filter(p => p.ativo !== false).length;
    const inativos = total - ativos;
    const comFoto  = todasPecas.filter(p => (p.imagens && p.imagens.length > 0) || (p.imagem && p.imagem.length > 10)).length;
    const valorTotal = todasPecas.reduce((s,p) => {
      const sal = saldos[p.id] || p.qtdAtual || 0;
      return s + (Number(p.precoUnitario)||0) * sal;
    }, 0);

    // Categorias únicas para o filtro

      const ativo = p.ativo !== false;

            </div> </div> </td> <td> <span style="display:inline-block;background:var(--accent-light);color:var(--accent-dark);font-size:11px;font-weight:700;padding:2px 8px;border-radius:12px;letter-spacing:.3px"> ${Utils.safe(p.categoria||'-')}
          </span> </td> <td style="font-size:12px;text-align:center">${Utils.safe(p.unidade||'UN')}</td> <td> <div style="display:flex;align-items:center;gap:6px"> <span style="font-weight:700;font-size:13px;min-width:28px">${saldo}</span> <div style="flex:1;height:5px;border-radius:3px;background:var(--border);overflow:hidden;min-width:40px"> <div style="height:100%;border-radius:3px;background:${st.classe === 'ok' ? 'var(--success)' : st.classe === 'low' ? 'var(--warning)' : 'var(--danger)'};width:${pct}%"></div> </div> <span style="font-size:10px;color:var(--text-muted)">${p.estoqueMinimo}</span> </div> </td> <td style="font-size:12px;text-align:right">${Number(p.precoUnitario) > 0 ? Utils.fmtMoeda(Number(p.precoUnitario)) : '<span style="color:var(--text-muted)">-</span>'}</td> <td style="font-size:11px;color:var(--text-muted)">${Utils.safe(p.localização||p.localizacao||'-')}</td> <td style="text-align:center"> <span class="badge badge-${ativo ? 'ok' : 'critical'}">${ativo ? 'Ativo' : 'Inativo'}</span> </td> </tr>`;
    });

    return `
      <!-- HEADER --> <div class="relatorio-header"> <div> <div class="relatorio-titulo"> Catálogo de Materiais</div> <div class="relatorio-subtitle">Todos os materiais cadastrados - ${total} itens em ${cats.length} categorias</div> </div> </div> <!-- KPIs --> <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px"> <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow)"> <div style="width:40px;height:40px;border-radius:10px;background:#E4EAFB;color:var(--primary);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0"></div> <div><div style="font-size:22px;font-weight:800;color:var(--text);line-height:1">${total}</div><div style="font-size:11px;color:var(--text-muted);margin-top:2px">Total de Itens</div></div> </div> <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow)"> <div style="width:40px;height:40px;border-radius:10px;background:#E6F4EA;color:var(--success);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0"></div> <div><div style="font-size:22px;font-weight:800;color:var(--text);line-height:1">${ativos}</div><div style="font-size:11px;color:var(--text-muted);margin-top:2px">Ativos</div></div> </div> <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow)"> <div style="width:40px;height:40px;border-radius:10px;background:#FCE8E6;color:var(--danger);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0"></div> <div><div style="font-size:22px;font-weight:800;color:var(--text);line-height:1">${inativos}</div><div style="font-size:11px;color:var(--text-muted);margin-top:2px">Inativos</div></div> </div> <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow)"> <div style="width:40px;height:40px;border-radius:10px;background:#FFF0DC;color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0"></div> <div><div style="font-size:22px;font-weight:800;color:var(--text);line-height:1">${comFoto}</div><div style="font-size:11px;color:var(--text-muted);margin-top:2px">Com Foto</div></div> </div> <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow)"> <div style="width:40px;height:40px;border-radius:10px;background:#E4EAFB;color:var(--primary);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0"></div> <div><div style="font-size:15px;font-weight:800;color:var(--text);line-height:1.2">${Utils.fmtMoeda(valorTotal)}</div><div style="font-size:11px;color:var(--text-muted);margin-top:2px">Valor em Estoque</div></div> </div> </div> <!-- FILTROS --> <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px"> <div class="search-bar" style="flex:1;min-width:200px"> <input type="text" id="cat-busca" placeholder="Buscar por código, nome, categoria ou local..." oninput="filtrarCatalogo()" style="border:none;background:transparent;outline:none;font-size:13px;color:var(--text);flex:1;padding:0"> </div> <select id="cat-filtro-cat" onchange="filtrarCatalogo()" style="padding:7px 12px;font-size:13px;border:1.5px solid var(--border);border-radius:8px;background:var(--card);color:var(--text)"> <option value="">Todas as Categorias (${cats.length})</option> ${cats.map(c => `<option value="${Utils.safe(c)}">${Utils.safe(c)}</option>`).join('')}
        </select> <select id="cat-filtro-status" onchange="filtrarCatalogo()" style="padding:7px 12px;font-size:13px;border:1.5px solid var(--border);border-radius:8px;background:var(--card);color:var(--text)"> <option value="">Todos os Status</option> <option value="true">Somente Ativos</option> <option value="false">Somente Inativos</option> </select> <span id="cat-contagem" style="font-size:12px;color:var(--text-muted);white-space:nowrap">${total} itens</span> </div> <!-- TABELA --> <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:var(--shadow)"> <div class="table-wrapper"> <table id="tabela-catalogo"> <thead> <tr> <th style="width:90px">Código</th> <th>Nome / Descrição</th> <th>Categoria</th> <th style="text-align:center;width:50px">Un.</th> <th style="width:160px">Saldo / Nível</th> <th style="text-align:right;width:100px">Preço Unit.</th> <th style="width:80px">Local</th> <th style="text-align:center;width:72px">Status</th> </tr> </thead> <tbody id="tbody-catalogo"> ${rows.join('')}
            </tbody> </table> </div> <div id="cat-empty" style="display:none;text-align:center;padding:40px 20px;color:var(--text-muted)"> <div style="font-size:36px;opacity:.3;margin-bottom:8px"></div> <p style="font-size:14px">Nenhum item encontrado</p> </div> </div> `;

  function filtrarCatalogo() {
    const busca   = (document.getElementById('cat-busca').value || '').toLowerCase().trim();
    const catFil  = (document.getElementById('cat-filtro-cat').value || '').toLowerCase();
    const stFil   = document.getElementById('cat-filtro-status').value || '';
    const rows    = document.querySelectorAll('#tbody-catalogo .cat-row');
    let visivel   = 0;
    rows.forEach(tr => {
      const b   = tr.dataset.busca || '';
      const cat = (tr.dataset.cat || '').toLowerCase();
      const ativo = tr.dataset.ativo;
      const okB = !busca || b.includes(busca);
      const okC = !catFil || cat === catFil;
      const okS = !stFil || ativo === stFil;
      const show = okB && okC && okS;
      tr.dataset.pagOut = show  '' : '1';
      if (show) visivel++;
    });
    const contEl = document.getElementById('cat-contagem');
    if (contEl) contEl.textContent = visivel + ' itens';
    const emptyEl = document.getElementById('cat-empty');
    if (emptyEl) emptyEl.style.display = visivel === 0  '' : 'none';
    if (_pag['tbody-catalogo']) { _pag['tbody-catalogo'].page = 1; _applyPaginacao('tbody-catalogo'); }
  }

  // -- CUSTO POR FORNECEDOR ------------------------------
  function relFornecedor() {
    const pecasMap = {};
    DB.Pecas.listar().forEach(p => pecasMap[p.id] = p);
    const usuariosMap = {};
    DB.Usuarios.listar().forEach(u => usuariosMap[u.id] = u.nome);
    const fornMap  = {};
    DB.Movimentos.listar().filter(m => m.tipo === 'ENTRADA').forEach(m => {
      const p = pecasMap[m.pecaId];
      if (!p) return;
      const f = p.fornecedor || '(sem fornecedor)';
      if (!fornMap[f]) fornMap[f] = { qtd: 0, valor: 0, itens: new Set(), movs: [] };
      fornMap[f].qtd   += Number(m.quantidade);
      fornMap[f].valor += Number(m.quantidade) * (Number(m.precoUnitario)||Number(p.precoUnitario)||0);
      fornMap[f].itens.add(p.id);
      fornMap[f].movs.push(m);
    });
    const lista = Object.entries(fornMap).sort((a,b) => b[1].valor - a[1].valor);
    const total  = lista.reduce((s,[,v]) => s + v.valor, 0);
    const maxVal = (lista[0]  lista[0][1].valor : 0) || 1;
    const rows   = lista.map(([forn, v]) => `<tr class="forn-row"
        data-busca="${forn.toLowerCase()}"
        style="cursor:pointer"
        onclick="verDetalheFornecedor(${JSON.stringify(forn)})"
        title="Clique para ver detalhes"> <td style="font-weight:600;color:var(--primary-dark)">${Utils.safe(forn)}</td> <td style="text-align:center">${v.itens.size}</td> <td style="text-align:center">${v.qtd}</td> <td style="text-align:right;font-weight:700">${Utils.fmtMoeda(v.valor)}</td> <td style="min-width:100px"> <div style="height:6px;background:var(--border);border-radius:3px;overflow:hidden"> <div style="height:100%;width:${(v.valor/maxVal*100).toFixed(1)}%;background:var(--primary);border-radius:3px"></div> </div> </td> <td style="text-align:right;color:var(--text-muted)">${total > 0  (v.valor / total * 100).toFixed(1) + '%' : '-'}</td> </tr>`);
    return `

  function filtrarFornecedor() {
    const busca = (document.getElementById('forn-busca').value || '').toLowerCase().trim();
    const rows  = document.querySelectorAll('#tbody-fornecedor .forn-row');
    let visivel = 0;
    rows.forEach(tr => {
      const show = !busca || (tr.dataset.busca||'').includes(busca);
      tr.dataset.pagOut = show  '' : '1';
      if (show) visivel++;
    });
    const contEl = document.getElementById('forn-contagem');
    if (contEl) contEl.textContent = visivel + ' fornecedores';
    if (_pag['tbody-fornecedor']) { _pag['tbody-fornecedor'].page = 1; _applyPaginacao('tbody-fornecedor'); }
  }

  function verDetalheFornecedor(nomeFornecedor) {
    const pecasMap = {};
    DB.Pecas.listar().forEach(p => pecasMap[p.id] = p);
    const usuariosMap = {};
    DB.Usuarios.listar().forEach(u => usuariosMap[u.id] = u.nome);
    const movs = DB.Movimentos.listar().filter(m => {
      if (m.tipo !== 'ENTRADA') return false;
      const p = pecasMap[m.pecaId];
      const f = p  (p.fornecedor || '(sem fornecedor)') : '(sem fornecedor)';
      return f === nomeFornecedor;
    }).sort((a,b) => (b.data||'').localeCompare(a.data||''));
    const rows = movs.map(m => {
      const p = pecasMap[m.pecaId];
      const preco = Number(m.precoUnitario) || Number(p.precoUnitario) || 0;
      const total = preco * Number(m.quantidade);
      return `<tr> <td style="font-size:12px">${Utils.formatarData(m.data)}</td> <td>${p  Utils.safe(p.nome) : '-'}</td> <td style="text-align:center">${m.quantidade} ${p  Utils.safe(p.unidade) : ''}</td> <td style="text-align:right">${preco > 0  Utils.fmtMoeda(preco) : '-'}</td> <td style="text-align:right;font-weight:700">${total > 0  Utils.fmtMoeda(total) : '-'}</td> <td style="font-size:12px">${Utils.safe(usuariosMap[m.responsavel]||'-')}</td> <td style="font-size:12px">${Utils.safe(m.ordemServico||'-')}</td> </tr>`;
    });
    document.getElementById('drill-titulo').textContent = ' ' + nomeFornecedor;
    document.getElementById('drill-body').innerHTML = rows.length === 0 ? '<div class="empty-state"><p>Nenhuma entrada encontrada.</p></div>'
      : `<div class="table-wrapper"><table> <thead><tr><th>Data</th><th>Peça</th><th style="text-align:center">Qtd</th><th style="text-align:right">Preço Unit.</th><th style="text-align:right">Total</th><th>Responsável</th><th>OS</th></tr></thead> <tbody>${rows.join('')}</tbody> </table></div>`;
    Utils.abrirModal('modal-drill');
  }

lay:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px"> <div class="search-bar" style="flex:1;min-width:200px"> <input type="text" id="ajuste-busca" placeholder="Buscar por peça ou motivo..." oninput="filtrarAjustes()" style="border:none;background:transparent;outline:none;font-size:13px;color:var(--text);flex:1;padding:0"> </div> <select id="ajuste-filtro-tipo" onchange="filtrarAjustes()" style="padding:7px 12px;font-size:13px;border:1.5px solid var(--border);border-radius:8px;background:var(--card);color:var(--text)"> <option value="">Todos os Tipos</option> <option value="add">Somente Adições </option> <option value="sub">Somente Subtrações </option> </select> <span id="ajuste-contagem" style="font-size:12px;color:var(--text-muted);white-space:nowrap">${ajustes.length} ajustes</span> </div> <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:var(--shadow)"> <div class="table-wrapper"> <table> <thead><tr><th style="width:130px">Data/Hora</th><th>Peça</th><th style="text-align:center;width:100px">Saldo Anterior</th><th style="text-align:center;width:90px">Saldo Novo</th><th style="text-align:center;width:90px">Diferença</th><th style="width:120px">Responsável</th><th>Motivo</th></tr></thead> <tbody id="tbody-ajustes"> ${rows.join('') || '<tr><td colspan="7" style="text-align:center;color:var(--text-muted)">Nenhum ajuste registrado</td></tr>'}

  // -- CONSERTOS EXTERNOS --------------------------------
  function relConsertos() {
    const consertos = DB.Consertos.listar();
    const hoje = new Date().toISOString().slice(0, 10);
    const mesAtual = hoje.slice(0, 7);

    // KPIs
    let total = 0, emAberto = 0, emConserto = 0, finalizado = 0, prazoVencido = 0;
    let somaCusto = 0, somaTempoFora = 0, countComTempo = 0;
    let noPrazo = 0, foraDoPrazo = 0;
    const porFornecedor = {}, porAtivo = {};
    const porMes = {};

    consertos.forEach(function(s) {
      total++;
      if (!['Finalizado','Cancelado'].includes(s.status)) emAberto++;
      if (['Enviado para conserto','Em conserto','Liberado para envio'].includes(s.status)) emConserto++;
      if (s.status === 'Prazo de retorno vencido') prazoVencido++;
      if (s.status === 'Finalizado') {
        finalizado++;
        const custo = parseFloat(s.valor_final_conserto) || parseFloat(s.valor_material) || 0;
        somaCusto += custo;
        if (s.data_real_envio && s.data_real_retorno) {
          const dias = Math.round((new Date(s.data_real_retorno + 'T12:00:00') - new Date(s.data_real_envio + 'T12:00:00')) / 86400000);
          if (dias >= 0) { somaTempoFora += dias; countComTempo++; }
          // % no prazo
          if (s.data_prevista_retorno) {
            if (s.data_real_retorno <= s.data_prevista_retorno) noPrazo++; else foraDoPrazo++;
          }
        }
      }
      // Agrupamento por fornecedor
      const forn = (s.fornecedor_razao_social || s.fornecedor_nome_fantasia || 'Sem fornecedor').trim();
      if (!porFornecedor[forn]) porFornecedor[forn] = { total: 0, custo: 0, vencido: 0 };
      porFornecedor[forn].total++;
      if (s.status === 'Finalizado') porFornecedor[forn].custo += (parseFloat(s.valor_final_conserto) || 0);
      if (s.status === 'Prazo de retorno vencido') porFornecedor[forn].vencido++;
      // Por mês de abertura
      const mes = (s.data_abertura || '').slice(0, 7);
      if (mes) { porMes[mes] = (porMes[mes] || 0) + 1; }
    });

    const tempoMedio = countComTempo > 0  Math.round(somaTempoFora / countComTempo) : null;
    const pctNoPrazo = (noPrazo + foraDoPrazo) > 0  Math.round(noPrazo / (noPrazo + foraDoPrazo) * 100) : null;

    const fornRanking = Object.entries(porFornecedor)
      .sort(function(a, b) { return b[1].total - a[1].total; });

    const mesesOrdenados = Object.entries(porMes)
      .sort(function(a, b) { return a[0].localeCompare(b[0]); })
      .slice(-12);

    const kpiBox = function(icon, label, val, color) {
      return '<div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px 16px">'
        + '<div style="font-size:11.5px;color:var(--text-muted);margin-bottom:4px">' + icon + ' ' + label + '</div>'
        + '<div style="font-size:22px;font-weight:800;color:' + color + ';line-height:1.1">' + val + '</div>'
        + '</div>';
    };

    return '<div class="relatorio-header">'
      + '<div><div class="relatorio-titulo"> Consertos Externos</div>'
      + '<div class="relatorio-subtitle">Relatório de solicitações de conserto - gerado em ' + new Date().toLocaleDateString('pt-BR') + '</div></div>'
      + '<div class="no-print"><button class="btn btn-outline btn-sm" onclick="window.print()"> Imprimir</button></div>'
      + '</div>'

      + '<div class="sumario-kpis">'
      + kpiBox('', 'Total de solicitações', total, 'var(--text)')
      + kpiBox('', 'Em aberto', emAberto, 'var(--primary)')
      + kpiBox('', 'Em conserto', emConserto, 'var(--primary)')
      + kpiBox('', 'Prazo vencido', prazoVencido, 'var(--danger)')
      + kpiBox('', 'Finalizados', finalizado, 'var(--success)')
      + (somaCusto > 0  kpiBox('', 'Custo total finaliz.', Utils.fmtMoeda(somaCusto), 'var(--success)') : '')
      + (tempoMedio !== null  kpiBox('', 'Tempo mdio (dias)', tempoMedio, 'var(--primary)') : '')
      + (pctNoPrazo !== null  kpiBox('', '% retornos no prazo', pctNoPrazo + '%', pctNoPrazo >= 70  'var(--success)' : 'var(--danger)') : '')
      + '</div>'

      + '<h3 style="font-size:14px;font-weight:700;margin:18px 0 10px">Custo por Fornecedor</h3>'
      + '<div class="table-wrapper"><table><thead><tr>'
      + '<th>Fornecedor</th><th style="text-align:center">Solicitações</th>'
      + '<th style="text-align:center">Prazo vencido</th><th style="text-align:right">Custo total</th></tr></thead>'
      + '<tbody>' + (fornRanking.length  fornRanking.map(function(r) {
            return '<tr><td>' + Utils.safe(r[0]) + '</td>'
              + '<td style="text-align:center">' + r[1].total + '</td>'
              + '<td style="text-align:center;color:' + (r[1].vencido > 0  'var(--danger)' : 'inherit') + '">' + r[1].vencido + '</td>'
              + '<td style="text-align:right">' + (r[1].custo > 0  Utils.fmtMoeda(r[1].custo) : '-') + '</td></tr>';
          }).join('')
        : '<tr><td colspan="4" style="text-align:center;color:var(--text-muted)">Nenhum dado</td></tr>')
      + '</tbody></table></div>'

      + '<h3 style="font-size:14px;font-weight:700;margin:18px 0 10px">Abertura por Mês</h3>'
      + '<div class="table-wrapper"><table><thead><tr><th>Mês/Ano</th><th style="text-align:center">Solicitações abertas</th></tr></thead>'
      + '<tbody>' + (mesesOrdenados.length  mesesOrdenados.map(function(m) {
            const partes = m[0].split('-');
            const nomesMes = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
            const label = nomesMes[(parseInt(partes[1])||1) - 1] + '/' + partes[0];
            return '<tr><td>' + label + '</td><td style="text-align:center">' + m[1] + '</td></tr>';
          }).join('')
        : '<tr><td colspan="2" style="text-align:center;color:var(--text-muted)">Nenhum dado</td></tr>')
      + '</tbody></table></div>'

      + '<h3 style="font-size:14px;font-weight:700;margin:18px 0 10px">Listagem completa</h3>'
      + '<div class="table-wrapper"><table><thead><tr>'
      + '<th>#</th><th>Material</th><th>Fornecedor</th><th>Aberto em</th>'
      + '<th>Status</th><th>Valor final</th><th>Dias fora</th></tr></thead>'
      + '<tbody id="tbody-consertos-rel">'
      + consertos.map(function(s) {
          const diasFora = (s.data_real_envio && s.data_real_retorno)  Math.round((new Date(s.data_real_retorno + 'T12:00:00') - new Date(s.data_real_envio + 'T12:00:00')) / 86400000)
            : (s.data_real_envio  Math.round((Date.now() - new Date(s.data_real_envio + 'T12:00:00')) / 86400000) : null);
          return '<tr>'
            + '<td>' + Utils.safe(s.numeroSolicitacao || '-') + '</td>'
            + '<td>' + Utils.safe(s.codigo_material_sap || s.descricao_material_sap || '-') + '</td>'
            + '<td>' + Utils.safe(s.fornecedor_razao_social || s.fornecedor_nome_fantasia || '-') + '</td>'
            + '<td>' + (s.data_abertura  new Date(s.data_abertura).toLocaleDateString('pt-BR') : '-') + '</td>'
            + '<td>' + Utils.safe(s.status || '-') + '</td>'
            + '<td>' + (s.valor_final_conserto  Utils.fmtMoeda(s.valor_final_conserto) : '-') + '</td>'
            + '<td style="text-align:center">' + (diasFora !== null  diasFora + 'd' : '-') + '</td>'
            + '</tr>';
        }).join('')
      + '</tbody></table></div>';
  }

      if (st.classe === 'ok') ok++;

      else critico++;
      valorTotal += s * (Number(p.precoUnitario) || 0);
    });
    const hoje = Utils.dataHoje();
    const movHoje = movs.filter(m => m.data.startsWith(hoje)).length;

    return `
      <div class="relatorio-header"> <div> <div class="relatorio-titulo"> Resumo Executivo</div> <div class="relatorio-subtitle">Visão consolidada do almoxarifado - ${new Date().toLocaleDateString('pt-BR',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</div> </div> </div> <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px"> <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow)"> <div style="width:40px;height:40px;border-radius:10px;background:#E4EAFB;color:var(--primary);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0"></div> <div><div style="font-size:22px;font-weight:800;color:var(--text);line-height:1">${pecas.length}</div><div style="font-size:11px;color:var(--text-muted);margin-top:2px">Itens Cadastrados</div></div> </div> <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow)"> <div style="width:40px;height:40px;border-radius:10px;background:#E6F4EA;color:var(--success);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0"></div> <div><div style="font-size:22px;font-weight:800;color:var(--text);line-height:1">${ok}</div><div style="font-size:11px;color:var(--text-muted);margin-top:2px">Nível Normal</div></div> </div> <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow)"> <div style="width:40px;height:40px;border-radius:10px;background:#FFF8E1;color:var(--warning);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0"></div> <div><div style="font-size:22px;font-weight:800;color:var(--text);line-height:1">${baixo}</div><div style="font-size:11px;color:var(--text-muted);margin-top:2px">Estoque Baixo</div></div> </div> <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow)"> <div style="width:40px;height:40px;border-radius:10px;background:#FCE8E6;color:var(--danger);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0"></div> <div><div style="font-size:22px;font-weight:800;color:var(--text);line-height:1">${critico}</div><div style="font-size:11px;color:var(--text-muted);margin-top:2px">Críticos / Zerados</div></div> </div> <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow)"> <div style="width:40px;height:40px;border-radius:10px;background:#E4EAFB;color:var(--primary);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0"></div> <div><div style="font-size:13px;font-weight:800;color:var(--text);line-height:1.2">${Utils.fmtMoeda(valorTotal)}</div><div style="font-size:11px;color:var(--text-muted);margin-top:2px">Valor em Estoque</div></div> </div> <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow)"> <div style="width:40px;height:40px;border-radius:10px;background:#FFF0DC;color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0"></div> <div><div style="font-size:22px;font-weight:800;color:var(--text);line-height:1">${movHoje}</div><div style="font-size:11px;color:var(--text-muted);margin-top:2px">Movim. Hoje</div></div> </div> <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow)"> <div style="width:40px;height:40px;border-radius:10px;background:#E4EAFB;color:var(--primary);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0"></div> <div><div style="font-size:22px;font-weight:800;color:var(--text);line-height:1">${movMes}</div><div style="font-size:11px;color:var(--text-muted);margin-top:2px">Movim. Este Mês</div></div> </div> <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow)"> <div style="width:40px;height:40px;border-radius:10px;background:#FFF8E1;color:var(--warning);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0"></div> <div><div style="font-size:22px;font-weight:800;color:var(--text);line-height:1">${reqPend}</div><div style="font-size:11px;color:var(--text-muted);margin-top:2px">Req. Pendentes</div></div> </div> </div> ${topConsumidos.length  `
        <div style="display:flex;align-items:center;gap:8px;margin:4px 0 10px"> <h3 style="font-size:14px;font-weight:700;color:var(--text);margin:0"> Top 5 Itens Mais Consumidos</h3> </div> <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:var(--shadow)"> <div class="table-wrapper"> <table> <thead><tr><th style="text-align:center;width:44px">#</th><th>Peça</th><th style="text-align:center;width:120px">Total Saídas</th></tr></thead> <tbody>${topConsumidos.map((c,i) => `<tr> <td style="text-align:center"><span style="display:inline-block;width:26px;height:26px;border-radius:50%;background:${i < 3  'var(--primary)' : 'var(--bg)'};color:${i < 3  '#fff' : 'var(--text-muted)'};font-size:11px;font-weight:800;line-height:26px;text-align:center;border:1px solid var(--border)">${i+1}</span></td> <td style="font-weight:600;color:var(--primary-dark)">${Utils.safe(c.peca.nome)}</td> <td style="text-align:center;font-weight:700">${c.qtd}</td> </tr>`).join('')}</tbody> </table> </div> </div> ` : ''}
    `;
  }

  // -- PAGINAÇÃO GENÉRICA --------------------------------
  const _pag = {};
  function paginar(tbodyId, ps) {
    ps = ps || 10;
    const tbody = document.getElementById(tbodyId);
    if (!tbody) return;
    tbody.querySelectorAll('tr').forEach(function(r){ delete r.dataset.pagOut; });
    _pag[tbodyId] = { page: 1, ps: ps };
    _applyPaginacao(tbodyId);
  }
  function _applyPaginacao(tbodyId) {
    const cfg = _pag[tbodyId];
    if (!cfg) return;
    const tbody = document.getElementById(tbodyId);
    if (!tbody) return;
    const allRows = Array.from(tbody.querySelectorAll('tr'));
    const active  = allRows.filter(function(r){ return r.dataset.pagOut !== '1'; });
    const total   = active.length;
    const pages   = Math.max(1, Math.ceil(total / cfg.ps));
    if (cfg.page > pages) cfg.page = pages;
    const start = (cfg.page - 1) * cfg.ps;
    const end   = start + cfg.ps;
    allRows.forEach(function(r) {
      if (r.dataset.pagOut === '1') { r.style.display = 'none'; return; }
      var idx = active.indexOf(r);
      r.style.display = (idx >= start && idx < end)  '' : 'none';
    });
    _renderControlesPag(tbodyId, cfg.page, pages, total, cfg.ps);
  }
  function _renderControlesPag(tbodyId, page, pages, total, ps) {
    var ctrlId = 'pag-' + tbodyId;
    var el = document.getElementById(ctrlId);
    if (!el) {
      var tbody = document.getElementById(tbodyId);
      if (!tbody) return;
      var tableWrapper = tbody.closest('table')  tbody.closest('table').parentElement : null;
      if (!tableWrapper) return;
      el = document.createElement('div');
      el.id = ctrlId;
      tableWrapper.after(el);
    }
    var from = (page - 1) * ps + 1;
    var to   = Math.min(page * ps, total);
    var btns = '';
    if (pages > 1) {
      for (var p = 1; p <= pages; p++) {
        if (p === 1 || p === pages || (p >= page - 1 && p <= page + 1)) {
          var isAct = p === page;
          btns += '<button onclick="_irPagina(\'' + tbodyId + '\',' + p + ')" style="padding:4px 9px;border-radius:5px;border:1.5px solid ' + (isAct  'var(--primary)' : 'var(--border)') + ';background:' + (isAct  'var(--primary)' : 'var(--card)') + ';color:' + (isAct  '#fff' : 'var(--text)') + ';cursor:pointer;font-size:12px;font-weight:' + (isAct  '700' : '400') + '">' + p + '</button>';
        } else if (p === page - 2 || p === page + 2) {
          btns += '<span style="padding:4px 3px;font-size:12px;color:var(--text-muted)">...</span>';
        }
      }
    }
    var psOpts = [10,20,50,100].map(function(v){ return '<option value="'+v+'"'+(v === ps ? ' selected' : '')+'>'+v+'</option>'; }).join('');
    el.innerHTML = '<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;padding:10px 16px;border-top:1px solid var(--border)">'
      + '<span style="font-size:12px;color:var(--text-muted)">' + from + '-' + to + ' de ' + total + ' itens'
      + '&ensp;<label style="font-size:12px;color:var(--text-muted)">Linhas: <select onchange="_mudarPs(\''+tbodyId+'\',+this.value)" style="padding:2px 6px;font-size:12px;border:1px solid var(--border);border-radius:5px;background:var(--card);color:var(--text);cursor:pointer">'+ psOpts +'</select></label>'
      + '</span>'
      + '<div style="display:flex;gap:4px;align-items:center">' + btns + '</div></div>';
  }
  function _irPagina(tbodyId, page) {
    if (_pag[tbodyId]) { _pag[tbodyId].page = page; _applyPaginacao(tbodyId); }
  }
  function _mudarPs(tbodyId, ps) {
    if (_pag[tbodyId]) { _pag[tbodyId].ps = ps; _pag[tbodyId].page = 1; _applyPaginacao(tbodyId); }
  }

  function _inicializar() { renderRelatorio('inventario'); }
</script>
